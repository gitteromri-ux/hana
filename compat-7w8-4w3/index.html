## סקירה
זהו זיווג חי, מגנטי ומלא ניצוצות. ה־7w8 הוא הריאליסט: אנרגטי, נלהב, בעל תיאבון עצום לחוויה, לחופש ולחיים — והכנף 8 מוסיפה לו עוצמה, ישירות, נחישות וקרקוע מציאותי שמונע ממנו לרחף. הוא לא רק חולם, הוא מבצע. ה־4w3 הוא נשמה אמנותית: עמוק, ייחודי, בעל מחשבה מקורית וגאונית שלא דומה לאיש — והכנף 3 החזקה מוסיפה לו שאפתנות, זוהר, יכולת ביצוע ורצון להפוך את העומק הפנימי ליצירה שרואים בעולם. שניהם אינטנסיביים, שניהם מתעבים בינוניות, ושניהם רודפים אחרי חיים מלאים — ה־7 דרך חוויה והרפתקה, ה־4 דרך משמעות, יופי וזהות. כשזה עובד, זו שותפות של תשוקה, השראה הדדית ותנועה קדימה. כשזה לא — פער קצב בין מי שרץ החוצה למי שצולל פנימה.

## מה משותף
- **תשוקה לחיים לא־בינוניים** — שניכם לא מוכנים לשגרה שטוחה או לחיים פושרים.
- **אנרגיה ונוכחות** — הכנף 8 של ה־7 והכנף 3 של ה־4 הופכות אתכם לזוג שאנשים שמים לב אליו בחדר.
- **מקוריות** — ה־7 חושב מחוץ לקופסה, ה־4 חושב במקום שאין בו קופסה בכלל. יחד יוצרים עולם משלכם.
- **שאפתנות** — הכנף 8 דוחפת את ה־7 להשיג, הכנף 3 דוחפת את ה־4 להצליח ולהתבלט. שניכם רוצים להגיע רחוק.
- **ישירות ואותנטיות** — ה־7w8 אומר את האמת שלו בלי פילטר, ה־4w3 נאמן לזהות האמיתית שלו. אין כאן מסכות.
- **תנועה** — שניכם דוחפים קדימה: ה־7 אל החוויה הבאה, ה־4 אל העומק הבא והביטוי הבא של עצמו.

## מה שונה
ה־7w8 שוכן במרכז הראש (תכנון, חשש עתידי) עם דלק אינסטינקטיבי מהכנף 8 — הוא בורח מכאב אל אפשרויות, אל תנועה, אל הדבר הבא. ה־4w3 שוכן במרכז הלב (רגש, זהות) — הוא צולל דווקא אל מה שחסר, אל מה שאין, אל הכמיהה עצמה. הפער המרכזי: **ה־7 נמלט מהריק, ה־4 שוכן בתוכו והופך אותו ליצירה.** ה־7 אופטימי, מהיר, מגוון; ה־4 עמוק, ממוקד, בעל רגשות מתחלפים שנעים בעוצמה. בקונפליקט ה־7w8 מגיב מהר, ישיר, לפעמים בורח או תוקף אל הפתרון; ה־4 מתכנס פנימה ומעבד לאורך זמן. ה־7 מרחיב אל החוץ, ה־4 מעמיק אל הפנים.

חשוב: הרגשות של ה־4w3 הזה מתחלפים ונעים בעוצמה — אבל זו לא חרדת נטישה ולא דרמה ריקה. **זו כמיהה.** געגוע מתמשך אל מה שתמיד חסר, אל מה שלא כאן, אל השלמות שנמצאת תמיד צעד אחד מעבר. מתוך הכמיהה הזו נולדת היצירה, העומק, והמבט הייחודי שלו על העולם.

## משיכה
כמעט בלתי נמנעת. ה־4 נמשך לחיוניות, לחופש ולביטחון העצמי חסר הפחד של ה־7w8 — סוף־סוף מישהו שממלא את החדר באנרגיה ובאפשרויות, שמוציא אותו מהעומק כלפי מעלה אל האור והתנועה. ה־7w8 נשבה בעומק, בייחוד ובזוהר של ה־4w3 — סוף־סוף מישהו שיש בו קרקעית, מסתורין ועולם פנימי שלא נגמר, שלא משעמם לעולם. זו משיכה של השלמה: ה־7 מביא אור ותנועה, ה־4 מביא עומק ומשמעות. הכנף 8 של ה־7 מזהה בכנף 3 של ה־4 שאפתנות ועוצמה משלו — וזה מחשמל.

## רומנטיקה
חיוניות פוגשת נשמה. ה־7w8 הוא בן/בת זוג מלא חיים, נדיב בחוויות, שלוקח את ה־4 להרפתקאות ומראה לו שהעולם רחב ומלא אפשרויות. ה־4w3 מרומם את חיי ה־7 מעל השטחי והמהיר — מביא יופי, עומק רגשי, טקסיות ומשמעות. הכנף 8 של ה־7 מביאה נאמנות והגנה; הכנף 3 של ה־4 מביאה זוהר, שאפתנות משותפת ורצון לבנות משהו מרשים יחד. ה־7 נותן קלילות ותנועה, ה־4 נותן עומק ונשמה. הדינמיקה היומיומית: ה־7 ימשוך החוצה אל החיים, ה־4 ימשוך פנימה אל הקשר — וכשהם מכבדים את שני הקצבים, נוצר איזון נדיר בין הרפתקה לבין אינטימיות.

## רגש
כאן גם הפוטנציאל הגדול וגם השבר. ה־4w3 רוצה לחלוק רגש עמוק ולהיפגש בו במלואו; ה־7w8 מרגיש בעוצמה אך נוטה לברוח מרגש כבד אל תנועה, הומור או פתרון. הצמיחה של ה־7 היא לכיוון טיפוס 5 — שקט, עומק ונוכחות ברגע במקום בריחה אל הבא. ה־4 יכול להיות המפתח לכך: להראות ל־7 שיש עושר גם בצלילה, לא רק בריחוף. אם ה־7 בורח בכל פעם שהרגש מתעמק, ה־4 ירגיש לבד עם הכמיהה שלו. הכלל: את ה־4 צריך **לפגוש** בכמיהה שלו, לא לתקן אותה ולא להסיח אותה. את ה־7 צריך להזמין להישאר נוכח, בלי לכלוא. הרגשות המתחלפים של ה־4 הם לא בעיה לפתור — הם המקור לעומק ולאמנות שלו.

## מיניות מפורטת
אחד המישורים החזקים. ה־7 מביא חיוניות, סקרנות, שובבות ותיאבון עצום לחוויה; הכנף 8 מוסיפה עוצמה, נוכחות פיזית ותשוקה ישירה. ה־4 מביא עומק, דמיון וממד טקסי־אמנותי. ה־4 — ובמיוחד בגרסה עזה זו — הוא דומיננטי לצד רגשיותו, ואף שתלטן. הוא נמשך גם אל הכאב ואל העוצמה שבמין, ובעל מגע אחר משל כל שאר הטיפוסים: מעבר בין העולמות העדינים והרגישים ביותר לבין אגרסיביות ואף שליטה שמאפיינת אותו. אצלו הכאב הוא כאב חיובי — לא הרס, אלא עוצמה, נוכחות והתמסרות. ה־7w8, שהחופש והעוצמה הן שפת אם עבורו, פוגש ב־4 בן זוג שלא נרתע מכך אלא משיב בעוצמה משלו. במקום מאבק כוחות — ריקוד של החלפת תפקידים: לפעמים ה־7 מוביל בחיוניות ובישירות, לפעמים ה־4 שולט ברגישות עזה שמערבבת רוך ואגרסיה.

## חברות
גם בלי רומנטיקה — שני אנשים שנמשכים זה לזה. ה־7w8 מכבד את ה־4 כי הוא אמיתי, עמוק ולא משעמם לעולם; ה־4 מעריך את החיוניות, החופש והנאמנות של ה־7. יחד יוצרים, יוצאים להרפתקאות ודוחפים זה את זה — ה־7 מוציא את ה־4 מהעומק אל החוויה, ה־4 מזמין את ה־7 אל המשמעות מעבר לכיף.

## משמעות
שניהם מחפשים חיים מלאים ולא־בינוניים בשום ממד. ה־7w8 לומד מה־4 שיש עושר ואמת דווקא בצלילה פנימה, שהעומק לא מסוכן אלא מעשיר. ה־4 לומד מה־7 לצאת מהכמיהה אל התנועה, לחגוג את מה שיש ולא רק לגעגע למה שאין. יחד: אמנות ותנועה, עומק וחופש.

## איך להתחיל
כנות מהרגע הראשון · תנו ל־7 להביא את הקלילות והתנועה אך בלי לבטל את העומק · אל תמהרו לברוח מרגע רגשי · חוו יחד (הרפתקה, יצירה, מסע) · הגדירו מוקדם שלכל אחד קצב שונה — אחד רץ החוצה, אחד צולל פנימה, ושניהם לגיטימיים.

## ממה להיזהר
בריחה של ה־7 מרגש עמוק · חוסר סבלנות של ה־7 מול הקצב האיטי־מעמיק של ה־4 · הכמיהה של ה־4 שעלולה להרגיש כמו "אף פעם לא מספיק" עבור ה־7 · מאבקי שליטה (הכנף 8 וה־4 הדומיננטי, שניכם עזים) · ה־7 שממלא את הריק בגירויים במקום להישאר עם ה־4 בעומק.

## פוטנציאל
כשהוא בריא — קשר יוצא דופן: חי, נאמן, יצירתי ומלא תשוקה, שבו כל צד ממלא בדיוק את מה שחסר לשני. ה־7 מביא אור, תנועה וחופש; ה־4 מביא עומק, יופי וגאונות ייחודית. אש וחלום, חופש ונשמה — ריקוד בין מי שרץ אל החיים למי שהופך אותם ליצירה.

    const container = document.getElementById('content');
    const blocks = md.trim().split(/\n##\s+/);
    // first block starts with "# title" — skip it, hero already shows title
    blocks.slice(1).forEach(b=>{
      const lines = b.split('\n');
      const title = lines.shift().trim();
      const body = lines.join('\n').trim();
      const sec = document.createElement('section');
      const isList = /^-\s+/m.test(body) && !/^[^-]/m.test(body.split('\n')[0]);
      let inner = '<h2>'+title+'</h2>';
      // detect "flow" style short items separated by · within bullet lines
      const bulletLines = body.split('\n').filter(l=>l.trim().startsWith('- '));
      if (bulletLines.length && bulletLines.length === body.split('\n').filter(l=>l.trim()).length){
        const warn = /להיזהר/.test(title);
        inner += '<ul class="clean">';
        bulletLines.forEach(l=>{
          inner += '<li>'+fmt(l.replace(/^-\s+/,''))+'</li>';
        });
        inner += '</ul>';
      } else if (/·/.test(body) && body.split('\n').length<=2){
        const warn = /להיזהר/.test(title);
        inner += '<div class="flow '+(warn?'warn':'')+'">';
        body.split('·').forEach(t=>{ if(t.trim()) inner+='<span>'+fmt(t.trim())+'</span>'; });
        inner += '</div>';
      } else {
        body.split(/\n\n+/).forEach(p=>{ if(p.trim()) inner += '<p>'+fmt(p.trim())+'</p>'; });
      }
      if(/פוטנציאל|מיניות/.test(title)) sec.classList.add('highlight');
      sec.innerHTML = inner;
      container.appendChild(sec);
    });
    function fmt(s){
      return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    }
